<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Dominator Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202722;
        background: #f5f4ef;
      }
      main {
        width: min(560px, calc(100vw - 32px));
      }
      a, button { color: #0f5c4a; }
      .tagline { color: #a23f2d; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <p class="tagline">Find the market leak, then pretend it was obvious all along.</p>
      {% if publishable_key %}
        <h1>Sending you to Clerk.</h1>
        <p>Hold the clipboard. The auth bouncer is checking names.</p>
        <div id="sign-in"></div>
        <script
          async
          crossorigin="anonymous"
          data-clerk-publishable-key="{{ publishable_key }}"
          src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
          type="text/javascript">
        </script>
        <script>
          window.addEventListener("load", async () => {
            await window.Clerk.load();
            window.Clerk.mountSignIn(document.getElementById("sign-in"), {
              redirectUrl: "{{ redirect_url }}"
            });
          });
        </script>
      {% else %}
        <h1>Auth is not configured.</h1>
        <p>Set <code>CLERK_PUBLISHABLE_KEY</code> before asking the front office to open the door.</p>
      {% endif %}
    </main>
  </body>
</html>
