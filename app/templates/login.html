<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Dominator Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202722;
        background: #f5f4ef;
      }
      main {
        width: min(560px, calc(100vw - 32px));
      }
      a, button { color: #0f5c4a; }
      .tagline { color: #a23f2d; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <p class="tagline">Find the market leak, then pretend it was obvious all along.</p>
      {% if publishable_key %}
        <h1>Sign in to the Front Office.</h1>
        <p>Hold the clipboard. The auth bouncer is checking names.</p>
        <div id="sign-in"></div>
        <p id="clerk-status" class="tagline" hidden></p>
        <script
          async
          crossorigin="anonymous"
          data-clerk-publishable-key="{{ publishable_key }}"
          src="{{ clerk_js_url }}"
          type="text/javascript">
        </script>
        <script>
          (function () {
            var status = document.getElementById("clerk-status");
            var attempts = 0;
            function fail(message) {
              status.hidden = false;
              status.textContent = message;
            }
            function boot() {
              attempts += 1;
              if (!window.Clerk) {
                if (attempts > 100) {
                  fail("The Clerk script never arrived. Check the browser network tab or an ad blocker, then reload.");
                  return;
                }
                setTimeout(boot, 100);
                return;
              }
              window.Clerk.load()
                .then(function () {
                  if (window.Clerk.user) {
                    window.location.href = "{{ redirect_url }}";
                    return;
                  }
                  window.Clerk.mountSignIn(document.getElementById("sign-in"), {
                    fallbackRedirectUrl: "{{ redirect_url }}",
                    redirectUrl: "{{ redirect_url }}"
                  });
                })
                .catch(function (err) {
                  fail("Clerk failed to start: " + (err && err.message ? err.message : err));
                });
            }
            boot();
          })();
        </script>
      {% else %}
        <h1>Auth is not configured.</h1>
        <p>Set <code>CLERK_PUBLISHABLE_KEY</code> before asking the front office to open the door.</p>
      {% endif %}
    </main>
  </body>
</html>
